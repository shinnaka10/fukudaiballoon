<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>管理者ページ | FUKUDAI BALLOON</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;600&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --dark:  #0a1628;
      --dark2: #0f1e36;
      --gold:  #c8a84b;
      --gold-light: #dfc278;
      --white: #f8f5ee;
      --serif: 'Cormorant Garamond', Georgia, serif;
      --sans:  'Noto Sans JP', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--dark);
      color: var(--white);
      font-family: var(--sans);
      font-weight: 300;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    .hidden { display: none !important; }

    /* ---- Login ---- */
    #login-screen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .login-box {
      width: 100%;
      max-width: 400px;
      text-align: center;
    }

    .login-logo {
      font-family: var(--serif);
      font-weight: 600;
      font-size: 1.2rem;
      letter-spacing: 0.18em;
      color: var(--gold);
      margin-bottom: 8px;
    }

    .login-sub {
      font-size: 0.72rem;
      letter-spacing: 0.2em;
      color: rgba(248,245,238,0.4);
      margin-bottom: 48px;
      text-transform: uppercase;
    }

    .login-box h1 {
      font-family: var(--serif);
      font-weight: 300;
      font-size: 1.6rem;
      margin-bottom: 32px;
      color: var(--white);
    }

    .login-field {
      position: relative;
      margin-bottom: 16px;
    }

    .login-field input {
      width: 100%;
      padding: 16px 20px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(200,168,75,0.3);
      color: var(--white);
      font-family: var(--sans);
      font-weight: 300;
      font-size: 0.95rem;
      letter-spacing: 0.08em;
      outline: none;
      transition: border-color 0.3s;
    }

    .login-field input:focus {
      border-color: var(--gold);
    }

    .login-field input::placeholder {
      color: rgba(248,245,238,0.3);
    }

    #login-btn {
      width: 100%;
      padding: 16px;
      background: var(--gold);
      color: var(--dark);
      border: none;
      font-family: var(--sans);
      font-weight: 400;
      font-size: 0.82rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.3s;
      margin-top: 8px;
    }

    #login-btn:hover { background: var(--gold-light); }

    #login-error {
      margin-top: 16px;
      font-size: 0.82rem;
      color: #e05555;
      letter-spacing: 0.05em;
    }

    /* ---- Admin Panel ---- */
    .admin-nav {
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 40px;
      height: 64px;
      background: rgba(10,22,40,0.95);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(200,168,75,0.15);
    }

    .admin-logo {
      font-family: var(--serif);
      font-weight: 600;
      font-size: 1rem;
      letter-spacing: 0.12em;
      color: var(--gold);
    }

    .admin-nav-right {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .admin-nav a {
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      color: rgba(248,245,238,0.5);
      text-decoration: none;
      transition: color 0.3s;
    }

    .admin-nav a:hover { color: var(--gold); }

    #logout-btn {
      padding: 8px 20px;
      background: transparent;
      border: 1px solid rgba(200,168,75,0.35);
      color: rgba(248,245,238,0.7);
      font-family: var(--sans);
      font-size: 0.75rem;
      letter-spacing: 0.12em;
      cursor: pointer;
      transition: all 0.3s;
    }

    #logout-btn:hover {
      border-color: var(--gold);
      color: var(--gold);
    }

    .admin-main {
      max-width: 900px;
      margin: 0 auto;
      padding: 56px 32px 120px;
    }

    .admin-page-title {
      font-family: var(--serif);
      font-weight: 300;
      font-size: 2rem;
      color: var(--white);
      margin-bottom: 8px;
    }

    .admin-page-sub {
      font-size: 0.78rem;
      color: rgba(248,245,238,0.4);
      letter-spacing: 0.08em;
      margin-bottom: 56px;
      padding-bottom: 24px;
      border-bottom: 1px solid rgba(200,168,75,0.12);
    }

    .admin-section {
      margin-bottom: 56px;
      padding: 40px 44px;
      border: 1px solid rgba(200,168,75,0.15);
      background: rgba(200,168,75,0.02);
    }

    .admin-section h2 {
      font-family: var(--serif);
      font-weight: 400;
      font-size: 1.25rem;
      color: var(--white);
      margin-bottom: 6px;
      letter-spacing: 0.04em;
    }

    .section-desc {
      font-size: 0.78rem;
      color: rgba(248,245,238,0.45);
      margin-bottom: 28px;
      letter-spacing: 0.04em;
    }

    .section-divider {
      width: 32px;
      height: 1px;
      background: var(--gold);
      margin: 12px 0 28px;
    }

    label {
      display: block;
      font-size: 0.72rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 10px;
    }

    textarea, input[type="text"], input[type="url"] {
      width: 100%;
      padding: 14px 16px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(200,168,75,0.2);
      color: var(--white);
      font-family: var(--sans);
      font-weight: 300;
      font-size: 0.9rem;
      line-height: 1.8;
      outline: none;
      transition: border-color 0.3s;
      resize: vertical;
    }

    textarea:focus, input[type="text"]:focus, input[type="url"]:focus {
      border-color: var(--gold);
    }

    textarea::placeholder, input::placeholder {
      color: rgba(248,245,238,0.25);
    }

    textarea { min-height: 120px; }

    .preview-box {
      margin-top: 12px;
      padding: 14px 16px;
      background: rgba(200,168,75,0.06);
      border-left: 2px solid var(--gold);
      font-size: 0.86rem;
      line-height: 1.8;
      color: rgba(248,245,238,0.75);
      min-height: 48px;
    }

    .preview-empty {
      color: rgba(248,245,238,0.25);
      font-style: italic;
      font-size: 0.8rem;
    }

    .btn-row {
      display: flex;
      gap: 12px;
      margin-top: 20px;
      flex-wrap: wrap;
    }

    .btn-save {
      padding: 12px 28px;
      background: var(--gold);
      color: var(--dark);
      border: none;
      font-family: var(--sans);
      font-weight: 400;
      font-size: 0.78rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.3s;
    }

    .btn-save:hover { background: var(--gold-light); }

    .btn-clear {
      padding: 12px 28px;
      background: transparent;
      border: 1px solid rgba(200,168,75,0.3);
      color: rgba(248,245,238,0.55);
      font-family: var(--sans);
      font-size: 0.78rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.3s;
    }

    .btn-clear:hover {
      border-color: #e05555;
      color: #e05555;
    }

    .toast {
      position: fixed;
      bottom: 32px;
      right: 32px;
      padding: 14px 24px;
      background: var(--gold);
      color: var(--dark);
      font-family: var(--sans);
      font-size: 0.82rem;
      letter-spacing: 0.08em;
      font-weight: 400;
      opacity: 0;
      transform: translateY(12px);
      transition: opacity 0.3s, transform 0.3s;
      pointer-events: none;
      z-index: 9999;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    /* Gallery */
    .gallery-add-row {
      display: grid;
      grid-template-columns: 1fr 200px auto;
      gap: 12px;
      align-items: end;
      margin-bottom: 24px;
    }

    .gallery-add-row .btn-save {
      height: 46px;
      white-space: nowrap;
    }

    .gallery-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .gallery-item {
      display: grid;
      grid-template-columns: 64px 1fr 1fr auto;
      gap: 12px;
      align-items: center;
      padding: 12px 16px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(200,168,75,0.12);
    }

    .gallery-thumb {
      width: 64px;
      height: 48px;
      object-fit: cover;
      background: rgba(200,168,75,0.08);
    }

    .gallery-thumb-placeholder {
      width: 64px;
      height: 48px;
      background: rgba(200,168,75,0.06);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .gallery-item-url {
      font-size: 0.75rem;
      color: rgba(248,245,238,0.5);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .gallery-item-caption {
      font-size: 0.82rem;
      color: rgba(248,245,238,0.7);
    }

    .btn-delete {
      padding: 6px 14px;
      background: transparent;
      border: 1px solid rgba(224,85,85,0.3);
      color: rgba(224,85,85,0.6);
      font-size: 0.72rem;
      cursor: pointer;
      transition: all 0.3s;
      white-space: nowrap;
    }

    .btn-delete:hover {
      border-color: #e05555;
      color: #e05555;
      background: rgba(224,85,85,0.06);
    }

    .gallery-empty {
      padding: 32px;
      text-align: center;
      color: rgba(248,245,238,0.25);
      font-size: 0.82rem;
      border: 1px dashed rgba(200,168,75,0.15);
    }

    .field-group {
      margin-bottom: 20px;
    }

    @media (max-width: 700px) {
      .admin-nav { padding: 0 20px; }
      .admin-main { padding: 40px 20px 80px; }
      .admin-section { padding: 28px 24px; }
      .gallery-add-row { grid-template-columns: 1fr; }
      .gallery-item { grid-template-columns: 48px 1fr auto; }
      .gallery-item-url { display: none; }
    }
  </style>
</head>
<body>

  <!-- Login Screen -->
  <div id="login-screen">
    <div class="login-box">
      <div class="login-logo">FUKUDAI BALLOON</div>
      <p class="login-sub">Administrator</p>
      <h1>管理者ログイン</h1>
      <div class="login-field">
        <input type="password" id="password-input" placeholder="パスワードを入力" autocomplete="current-password" />
      </div>
      <button id="login-btn">ログイン</button>
      <p id="login-error" class="hidden">パスワードが違います</p>
    </div>
  </div>

  <!-- Admin Panel -->
  <div id="admin-panel" class="hidden">
    <nav class="admin-nav">
      <div class="admin-logo">FUKUDAI BALLOON — 管理画面</div>
      <div class="admin-nav-right">
        <a href="index.html" target="_blank">サイトを見る</a>
        <button id="logout-btn">ログアウト</button>
      </div>
    </nav>

    <main class="admin-main">
      <h1 class="admin-page-title">コンテンツ管理</h1>
      <p class="admin-page-sub">変更は保存ボタンを押すと即時サイトに反映されます</p>

      <!-- お知らせ -->
      <div class="admin-section">
        <h2>お知らせ</h2>
        <div class="section-divider"></div>
        <p class="section-desc">サイト上部に表示されるお知らせ文を設定します。空欄の場合は非表示になります。</p>
        <div class="field-group">
          <label for="notice-input">お知らせ文</label>
          <textarea id="notice-input" placeholder="例：2026年佐賀インターナショナルバルーンフェスタへの出場が決定しました！"></textarea>
        </div>
        <div class="field-group">
          <label>プレビュー</label>
          <div class="preview-box" id="notice-preview"><span class="preview-empty">入力するとここに表示されます</span></div>
        </div>
        <div class="btn-row">
          <button class="btn-save" id="save-notice">保存する</button>
          <button class="btn-clear" id="clear-notice">削除する</button>
        </div>
      </div>

      <!-- ギャラリー -->
      <div class="admin-section">
        <h2>ギャラリー画像</h2>
        <div class="section-divider"></div>
        <p class="section-desc">サイトのギャラリーセクションに表示する画像を管理します。画像のURLを追加してください。</p>
        <div class="gallery-add-row">
          <div class="field-group" style="margin:0">
            <label for="gallery-url-input">画像URL</label>
            <input type="url" id="gallery-url-input" placeholder="https://..." />
          </div>
          <div class="field-group" style="margin:0">
            <label for="gallery-caption-input">キャプション（任意）</label>
            <input type="text" id="gallery-caption-input" placeholder="例：2025年 飛行訓練" />
          </div>
          <button class="btn-save" id="add-gallery-btn">追加</button>
        </div>
        <div id="gallery-list"></div>
      </div>
    </main>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const PW = 'fukudai1101';
    const SESSION_KEY = 'fdb_admin_session';
    const NOTICE_KEY  = 'fdb_notice';
    const GALLERY_KEY = 'fdb_gallery';

    // ---- helpers ----
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2400);
    }

    function getGallery() {
      try { return JSON.parse(localStorage.getItem(GALLERY_KEY) || '[]'); }
      catch { return []; }
    }

    function saveGallery(arr) {
      localStorage.setItem(GALLERY_KEY, JSON.stringify(arr));
    }

    // ---- login ----
    function enterAdmin() {
      document.getElementById('login-screen').classList.add('hidden');
      document.getElementById('admin-panel').classList.remove('hidden');
      loadNotice();
      renderGallery();
    }

    function tryLogin() {
      const val = document.getElementById('password-input').value;
      if (val === PW) {
        sessionStorage.setItem(SESSION_KEY, '1');
        document.getElementById('login-error').classList.add('hidden');
        enterAdmin();
      } else {
        document.getElementById('login-error').classList.remove('hidden');
        document.getElementById('password-input').value = '';
        document.getElementById('password-input').focus();
      }
    }

    document.getElementById('login-btn').addEventListener('click', tryLogin);
    document.getElementById('password-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') tryLogin();
    });

    document.getElementById('logout-btn').addEventListener('click', () => {
      sessionStorage.removeItem(SESSION_KEY);
      location.reload();
    });

    // Check existing session
    if (sessionStorage.getItem(SESSION_KEY) === '1') enterAdmin();

    // ---- お知らせ ----
    function loadNotice() {
      const saved = localStorage.getItem(NOTICE_KEY) || '';
      document.getElementById('notice-input').value = saved;
      updateNoticePreview(saved);
    }

    function updateNoticePreview(text) {
      const box = document.getElementById('notice-preview');
      if (text.trim()) {
        box.innerHTML = text.replace(/\n/g, '<br>');
        box.style.color = 'rgba(248,245,238,0.82)';
      } else {
        box.innerHTML = '<span class="preview-empty">入力するとここに表示されます</span>';
      }
    }

    document.getElementById('notice-input').addEventListener('input', e => {
      updateNoticePreview(e.target.value);
    });

    document.getElementById('save-notice').addEventListener('click', () => {
      const text = document.getElementById('notice-input').value.trim();
      localStorage.setItem(NOTICE_KEY, text);
      showToast('お知らせを保存しました');
    });

    document.getElementById('clear-notice').addEventListener('click', () => {
      if (!confirm('お知らせを削除しますか？')) return;
      localStorage.removeItem(NOTICE_KEY);
      document.getElementById('notice-input').value = '';
      updateNoticePreview('');
      showToast('お知らせを削除しました');
    });

    // ---- ギャラリー ----
    function renderGallery() {
      const list = document.getElementById('gallery-list');
      const items = getGallery();

      if (items.length === 0) {
        list.innerHTML = '<div class="gallery-empty">まだ画像が登録されていません</div>';
        return;
      }

      list.innerHTML = items.map((item, i) => `
        <div class="gallery-item" data-index="${i}">
          <img class="gallery-thumb"
               src="${escHtml(item.url)}"
               alt=""
               onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
          <div class="gallery-thumb-placeholder" style="display:none">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="rgba(200,168,75,0.4)" stroke-width="1.5">
              <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>
              <polyline points="21 15 16 10 5 21"/>
            </svg>
          </div>
          <div class="gallery-item-url">${escHtml(item.url)}</div>
          <div class="gallery-item-caption">${escHtml(item.caption || '—')}</div>
          <button class="btn-delete" data-index="${i}">削除</button>
        </div>
      `).join('');

      list.querySelectorAll('.btn-delete').forEach(btn => {
        btn.addEventListener('click', () => {
          const idx = parseInt(btn.dataset.index, 10);
          const arr = getGallery();
          arr.splice(idx, 1);
          saveGallery(arr);
          renderGallery();
          showToast('画像を削除しました');
        });
      });
    }

    document.getElementById('add-gallery-btn').addEventListener('click', () => {
      const url = document.getElementById('gallery-url-input').value.trim();
      const caption = document.getElementById('gallery-caption-input').value.trim();
      if (!url) {
        document.getElementById('gallery-url-input').focus();
        return;
      }
      const arr = getGallery();
      arr.push({ url, caption });
      saveGallery(arr);
      document.getElementById('gallery-url-input').value = '';
      document.getElementById('gallery-caption-input').value = '';
      renderGallery();
      showToast('画像を追加しました');
    });

    document.getElementById('gallery-url-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('add-gallery-btn').click();
    });

    function escHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/"/g, '&quot;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    }
  </script>
</body>
</html>
