<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>管理者ページ | FUKUDAI BALLOON</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary:   #e8842a;
      --primary-d: #c86820;
      --bg:        #fff8f0;
      --card:      #ffffff;
      --text:      #2d1a00;
      --muted:     #8a6a50;
      --border:    #f0d8bc;
      --success:   #2e7d32;
      --error:     #c62828;
      --sans: 'Noto Sans JP', sans-serif;
      --radius: 12px;
      --shadow: 0 2px 16px rgba(232,132,42,0.10);
    }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── ログイン画面 ───────────────────────────────────────── */
    #login-screen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: linear-gradient(135deg, #fff8f0 0%, #ffe8cc 100%);
    }
    .login-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 48px 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 8px 40px rgba(232,132,42,0.15);
      text-align: center;
    }
    .login-logo {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.2em;
      color: var(--primary);
      margin-bottom: 8px;
    }
    .login-title {
      font-size: 22px;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 32px;
    }
    .login-card input[type="password"] {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid var(--border);
      border-radius: 8px;
      font-size: 16px;
      font-family: var(--sans);
      color: var(--text);
      background: var(--bg);
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 16px;
    }
    .login-card input:focus { border-color: var(--primary); }
    .login-card .btn-login {
      width: 100%;
      padding: 14px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 500;
      font-family: var(--sans);
      cursor: pointer;
      transition: background 0.2s;
    }
    .login-card .btn-login:hover { background: var(--primary-d); }
    #login-error {
      margin-top: 14px;
      color: var(--error);
      font-size: 13px;
      min-height: 20px;
    }

    /* ── 管理画面 ───────────────────────────────────────────── */
    #admin-screen { display: none; }

    .admin-nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--card);
      border-bottom: 2px solid var(--primary);
      padding: 0 24px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 8px rgba(232,132,42,0.08);
    }
    .admin-nav-logo {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.12em;
      color: var(--primary);
    }
    .admin-nav-logo span {
      font-size: 11px;
      font-weight: 400;
      color: var(--muted);
      margin-left: 8px;
    }
    .nav-actions { display: flex; gap: 12px; align-items: center; }
    .btn-site {
      font-size: 13px;
      color: var(--primary);
      text-decoration: none;
      font-family: var(--sans);
      font-weight: 500;
      padding: 6px 12px;
      border: 1.5px solid var(--primary);
      border-radius: 6px;
      transition: all 0.2s;
    }
    .btn-site:hover { background: var(--primary); color: #fff; }
    .btn-logout {
      font-size: 13px;
      color: var(--muted);
      background: none;
      border: 1.5px solid var(--border);
      border-radius: 6px;
      padding: 6px 12px;
      cursor: pointer;
      font-family: var(--sans);
      transition: all 0.2s;
    }
    .btn-logout:hover { border-color: var(--muted); color: var(--text); }

    .admin-main {
      max-width: 760px;
      margin: 0 auto;
      padding: 32px 24px 64px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    /* ── カード ─────────────────────────────────────────────── */
    .card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 28px 32px;
      box-shadow: var(--shadow);
      border-left: 4px solid var(--primary);
    }
    .card-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .card-title .badge {
      font-size: 10px;
      font-weight: 500;
      background: var(--primary);
      color: #fff;
      padding: 2px 8px;
      border-radius: 20px;
      letter-spacing: 0.05em;
    }
    .card-desc {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 20px;
      line-height: 1.6;
    }

    /* ── フォーム ────────────────────────────────────────────── */
    .form-row { display: flex; flex-direction: column; gap: 12px; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    label {
      font-size: 12px;
      font-weight: 500;
      color: var(--muted);
      letter-spacing: 0.05em;
    }
    label .req { color: var(--error); margin-left: 2px; }
    input[type="text"],
    input[type="url"],
    input[type="date"],
    textarea,
    input[type="password"] {
      padding: 11px 14px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
      font-family: var(--sans);
      color: var(--text);
      background: var(--bg);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      width: 100%;
    }
    input:focus, textarea:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(232,132,42,0.12);
    }
    textarea { resize: vertical; min-height: 90px; }

    .preview-img {
      max-width: 200px;
      max-height: 130px;
      border-radius: 6px;
      border: 1.5px solid var(--border);
      object-fit: cover;
      display: none;
    }

    /* ── ボタン ─────────────────────────────────────────────── */
    .btn-submit {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 28px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      font-family: var(--sans);
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      margin-top: 8px;
    }
    .btn-submit:hover { background: var(--primary-d); }
    .btn-submit:active { transform: scale(0.97); }
    .btn-submit:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }
    .btn-save {
      padding: 10px 20px;
      background: var(--text);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      font-family: var(--sans);
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn-save:hover { opacity: 0.8; }

    /* GAS URL */
    .gas-row {
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }
    .gas-row input { flex: 1; }
    .gas-status {
      font-size: 12px;
      color: var(--muted);
      margin-top: 8px;
    }
    .gas-status.ok  { color: var(--success); }
    .gas-status.err { color: var(--error); }

    /* ── トースト通知 ────────────────────────────────────────── */
    #toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--text);
      color: #fff;
      padding: 14px 28px;
      border-radius: 30px;
      font-size: 14px;
      font-weight: 500;
      box-shadow: 0 8px 24px rgba(0,0,0,0.20);
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.3s;
      opacity: 0;
      pointer-events: none;
      white-space: nowrap;
      z-index: 9999;
    }
    #toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }
    #toast.success { background: var(--success); }
    #toast.error   { background: var(--error); }

    /* ── スピナー ────────────────────────────────────────────── */
    .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }
    .btn-submit.loading .spinner { display: block; }
    .btn-submit.loading .btn-label { display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 480px) {
      .card { padding: 20px 18px; }
      .admin-main { padding: 20px 16px 48px; }
      .gas-row { flex-direction: column; }
      .btn-save { width: 100%; }
    }
  </style>
</head>
<body>

<!-- ════════════════════════════════════════════════════
     ログイン画面
════════════════════════════════════════════════════ -->
<div id="login-screen">
  <div class="login-card">
    <p class="login-logo">FUKUDAI BALLOON</p>
    <h1 class="login-title">管理者ログイン</h1>
    <input type="password" id="pw-input" placeholder="パスワードを入力"
           autocomplete="current-password"
           onkeydown="if(event.key==='Enter') login()" />
    <button class="btn-login" onclick="login()">ログイン</button>
    <p id="login-error"></p>
  </div>
</div>

<!-- ════════════════════════════════════════════════════
     管理ダッシュボード
════════════════════════════════════════════════════ -->
<div id="admin-screen">

  <nav class="admin-nav">
    <div class="admin-nav-logo">
      FUKUDAI BALLOON <span>管理画面</span>
    </div>
    <div class="nav-actions">
      <a href="index.html" class="btn-site" target="_blank">サイトを見る</a>
      <button class="btn-logout" onclick="logout()">ログアウト</button>
    </div>
  </nav>

  <main class="admin-main">

    <!-- GAS URL 設定 -->
    <div class="card">
      <div class="card-title">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/></svg>
        GAS Web App URL 設定
        <span class="badge">必須</span>
      </div>
      <p class="card-desc">
        Google Apps Script をデプロイして取得した URL を貼り付けてください。<br>
        ここが未設定だと投稿できません。
      </p>
      <div class="gas-row">
        <input type="url" id="gas-url" placeholder="https://script.google.com/macros/s/..." />
        <button class="btn-save" onclick="saveGasUrl()">保存</button>
      </div>
      <p class="gas-status" id="gas-status"></p>
    </div>

    <!-- お知らせ投稿 -->
    <div class="card">
      <div class="card-title">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8h1a4 4 0 0 1 0 8h-1"/><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/><line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/></svg>
        お知らせ投稿
      </div>
      <p class="card-desc">入力内容がスプレッドシートの「お知らせ」シートに追加されます。</p>
      <form class="form-row" onsubmit="submitNotice(event)">
        <div class="form-group">
          <label>日付</label>
          <input type="date" id="notice-date" />
        </div>
        <div class="form-group">
          <label>タイトル <span class="req">*</span></label>
          <input type="text" id="notice-title" placeholder="例：2026年度スポンサー募集を開始しました" required />
        </div>
        <div class="form-group">
          <label>内容</label>
          <textarea id="notice-content" placeholder="詳細な内容（省略可）"></textarea>
        </div>
        <div>
          <button type="submit" class="btn-submit" id="btn-notice">
            <div class="spinner"></div>
            <span class="btn-label">投稿する</span>
          </button>
        </div>
      </form>
    </div>

    <!-- ギャラリー追加 -->
    <div class="card">
      <div class="card-title">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        ギャラリー画像追加
      </div>
      <p class="card-desc">画像の URL を入力してください。スプレッドシートの「ギャラリー」シートに追加されます。</p>
      <form class="form-row" onsubmit="submitGallery(event)">
        <div class="form-group">
          <label>画像 URL <span class="req">*</span></label>
          <input type="url" id="gallery-url" placeholder="https://..." required
                 oninput="previewImage(this.value)" />
        </div>
        <img id="preview-img" class="preview-img" alt="プレビュー" />
        <div class="form-group">
          <label>キャプション</label>
          <input type="text" id="gallery-caption" placeholder="例：2025年佐賀バルーンフェスタ" />
        </div>
        <div>
          <button type="submit" class="btn-submit" id="btn-gallery">
            <div class="spinner"></div>
            <span class="btn-label">追加する</span>
          </button>
        </div>
      </form>
    </div>

  </main>
</div>

<!-- トースト -->
<div id="toast"></div>

<script>
  const PW      = 'fukudai2026';
  const SESSION = 'fdb_admin_session';
  const GAS_KEY = 'fdb_gas_url';

  // ── 起動時 ──────────────────────────────────────────────────────────────
  if (sessionStorage.getItem(SESSION) === '1') {
    showAdmin();
  }

  // ── ログイン ─────────────────────────────────────────────────────────────
  function login() {
    const val = document.getElementById('pw-input').value;
    if (val === PW) {
      sessionStorage.setItem(SESSION, '1');
      showAdmin();
    } else {
      const err = document.getElementById('login-error');
      err.textContent = 'パスワードが違います';
      document.getElementById('pw-input').value = '';
      setTimeout(() => { err.textContent = ''; }, 3000);
    }
  }

  function logout() {
    sessionStorage.removeItem(SESSION);
    location.reload();
  }

  function showAdmin() {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('admin-screen').style.display = 'block';
    loadGasUrl();
  }

  // ── GAS URL ──────────────────────────────────────────────────────────────
  function loadGasUrl() {
    const url = localStorage.getItem(GAS_KEY) || '';
    document.getElementById('gas-url').value = url;
    updateGasStatus(url);
  }

  function saveGasUrl() {
    const url = document.getElementById('gas-url').value.trim();
    if (url) {
      localStorage.setItem(GAS_KEY, url);
      updateGasStatus(url);
      showToast('GAS URL を保存しました', 'success');
    } else {
      showToast('URLを入力してください', 'error');
    }
  }

  function updateGasStatus(url) {
    const el = document.getElementById('gas-status');
    if (url) {
      el.textContent = '✓ URL設定済み';
      el.className   = 'gas-status ok';
    } else {
      el.textContent = '⚠ URLが未設定です。投稿する前に設定してください。';
      el.className   = 'gas-status err';
    }
  }

  // ── お知らせ投稿 ─────────────────────────────────────────────────────────
  async function submitNotice(e) {
    e.preventDefault();
    const btn = document.getElementById('btn-notice');
    setLoading(btn, true);
    try {
      const result = await postToGas({
        action:  'add_notice',
        date:    document.getElementById('notice-date').value,
        title:   document.getElementById('notice-title').value.trim(),
        content: document.getElementById('notice-content').value.trim()
      });
      if (result.status === 'ok') {
        showToast('お知らせを投稿しました！', 'success');
        document.getElementById('notice-title').value   = '';
        document.getElementById('notice-content').value = '';
        document.getElementById('notice-date').value    = '';
      } else {
        showToast('エラー: ' + result.message, 'error');
      }
    } catch (err) {
      showToast('通信エラー: ' + err.message, 'error');
    } finally {
      setLoading(btn, false);
    }
  }

  // ── ギャラリー追加 ───────────────────────────────────────────────────────
  async function submitGallery(e) {
    e.preventDefault();
    const btn = document.getElementById('btn-gallery');
    setLoading(btn, true);
    try {
      const result = await postToGas({
        action:   'add_gallery',
        url:      document.getElementById('gallery-url').value.trim(),
        caption:  document.getElementById('gallery-caption').value.trim()
      });
      if (result.status === 'ok') {
        showToast('ギャラリーに追加しました！', 'success');
        document.getElementById('gallery-url').value     = '';
        document.getElementById('gallery-caption').value = '';
        document.getElementById('preview-img').style.display = 'none';
      } else {
        showToast('エラー: ' + result.message, 'error');
      }
    } catch (err) {
      showToast('通信エラー: ' + err.message, 'error');
    } finally {
      setLoading(btn, false);
    }
  }

  // ── GAS API 呼び出し ─────────────────────────────────────────────────────
  async function postToGas(payload) {
    const gasUrl = localStorage.getItem(GAS_KEY);
    if (!gasUrl) throw new Error('GAS URLが設定されていません');

    const resp = await fetch(gasUrl, {
      method:  'POST',
      headers: { 'Content-Type': 'text/plain;charset=UTF-8' },
      body:    JSON.stringify(payload)
    });

    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    return resp.json();
  }

  // ── 画像プレビュー ───────────────────────────────────────────────────────
  function previewImage(url) {
    const img = document.getElementById('preview-img');
    if (url && url.startsWith('http')) {
      img.src              = url;
      img.style.display    = 'block';
      img.onerror = () => { img.style.display = 'none'; };
    } else {
      img.style.display = 'none';
    }
  }

  // ── UI ユーティリティ ────────────────────────────────────────────────────
  function setLoading(btn, on) {
    btn.disabled = on;
    btn.classList.toggle('loading', on);
  }

  let toastTimer;
  function showToast(msg, type = '') {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className   = 'show ' + type;
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { el.className = ''; }, 3500);
  }
</script>
</body>
</html>
